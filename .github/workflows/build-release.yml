name: 🤖 Build & Release PhoneAI APK

on:
  push:
    branches: [ main ]
    paths:
      - 'PhoneAI-Android/**'
      - 'version.json'
      - '.github/workflows/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up JDK 21 ─────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Read current version & bump it ─────────────────────────
      - name: Compute next version
        id: ver
        run: |
          OLD_CODE=$(python3 -c "import json; print(json.load(open('version.json'))['version_code'])")
          NEW_CODE=$((OLD_CODE + 1))
          NEW_NAME="1.$((NEW_CODE - 1))"
          TAG="v${NEW_NAME}"
          echo "old_code=$OLD_CODE"  >> $GITHUB_OUTPUT
          echo "new_code=$NEW_CODE"  >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME"  >> $GITHUB_OUTPUT
          echo "tag=$TAG"            >> $GITHUB_OUTPUT
          echo "🔢 Bumping version: $OLD_CODE → $NEW_CODE ($TAG)"

      # ── 5. Patch versionCode in build.gradle ──────────────────────
      - name: Patch versionCode in build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.new_code }}/" \
            PhoneAI-Android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.ver.outputs.new_name }}\"/" \
            PhoneAI-Android/app/build.gradle
          echo "✅ build.gradle patched"

      # ── 6. Write local.properties (SDK path for Linux) ───────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > PhoneAI-Android/local.properties

      # ── 7. Make gradlew executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x PhoneAI-Android/gradlew 2>/dev/null || true

      # ── 8. Build APK ──────────────────────────────────────────────
      - name: Build APK
        run: |
          cd PhoneAI-Android
          gradle assembleDebug --no-daemon 2>&1 | tail -20
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # ── 9. Copy & rename APK ─────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find PhoneAI-Android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK not found! Searching..."
            find PhoneAI-Android/app/build -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "✅ Found APK: $APK"
          cp "$APK" PhoneAI.apk
          ls -lh PhoneAI.apk

      # ── 10. Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "PhoneAI ${{ steps.ver.outputs.tag }}"
          body: |
            ## PhoneAI ${{ steps.ver.outputs.tag }}
            Auto-built by GitHub Actions on ${{ github.event.head_commit.timestamp }}

            **Changes:** ${{ github.event.head_commit.message }}
          files: PhoneAI.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Update version.json in repo ──────────────────────────
      - name: Update version.json
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          NEW_CODE="${{ steps.ver.outputs.new_code }}"
          NEW_NAME="${{ steps.ver.outputs.new_name }}"
          APK_URL="https://github.com/shaanshivraj/baymax/releases/download/${TAG}/PhoneAI.apk"
          DATE=$(date '+%d %b %Y')

          cat > version.json << JSONEOF
          {
            "version_code": ${NEW_CODE},
            "version_name": "${NEW_NAME}",
            "apk_url": "${APK_URL}",
            "changelog": "Auto-update ${DATE}: ${{ github.event.head_commit.message }}"
          }
          JSONEOF

          echo "✅ version.json updated to code=$NEW_CODE"

      # ── 12. Commit version bump back ─────────────────────────────
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json PhoneAI-Android/app/build.gradle
          git commit -m "chore: auto-bump to ${{ steps.ver.outputs.tag }} [skip ci]" || echo "Nothing to commit"
          git push
